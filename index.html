<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Ninja - Highscore Edition</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        #gameWrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            padding: 10px;
            box-sizing: border-box;
        }
        #scoreBoard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.75);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid #444;
            box-sizing: border-box;
            gap: 10px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        #levelBadge { color: #ffeb3b; }
        #score { color: #4caf50; }
        #highscore { color: #00bcd4; } /* Schickes Cyan für den Highscore */
        #lives { color: #f44336; }
        canvas {
            border: 4px solid #2d1a0e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 12px;
            max-width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            cursor: pointer;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div id="scoreBoard">
            <div class="stat-item">⚔️ Punkte: <span id="score">0</span></div>
            <div class="stat-item">🏆 Highscore: <span id="highscore">0</span></div>
            <div class="stat-item">❤️ Leben: <span id="lives">3</span></div>
            <div class="stat-item">⚡ Level: <span id="levelBadge">1</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highscoreEl = document.getElementById('highscore');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('levelBadge');

let gameState = "menue"; 

let score = 0;
// Lade den Highscore aus dem Speicher des Browsers, falls vorhanden (sonst startet er bei 0)
let highscore = localStorage.getItem("fn_highscore") ? parseInt(localStorage.getItem("fn_highscore")) : 0;
highscoreEl.innerText = highscore;

let lives = 3;
let objects = [];
let particles = [];
let slashTrail = [];

let currentLevel = 1;
let speedMultiplier = 0.75; 
let spawnChance = 0.015;     
let maxObjectsOnScreen = 2;  

// Game-Over "Play again" Button
const buttonX = 400;
const buttonY = 380;
const buttonW = 240;
const buttonH = 60;

// Dein Fruit Ninja Logo-Bild
const titleScreenImg = new Image();
titleScreenImg.src = 'https://raw.githubusercontent.com/AnonymmousFiles/images/main/IMG_1768.jpeg';

// START-Schriftzug im Rahmen
const startBtnW = 280;
const startBtnH = 90;
const startBtnX = 400 - startBtnW / 2;
const startBtnY = 460 - startBtnH / 2;

const fruitTypes = [
    { emoji: '🍉', size: 90 },
    { emoji: '🍌', size: 85 },
    { emoji: '🍓', size: 75 },
    { emoji: '🍋', size: 75 },
    { emoji: '🍎', size: 80 },
    { emoji: '💣', size: 80 }
];

function drawWoodBackground() {
    ctx.fillStyle = '#5c3a21';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#4a2e1a';
    for(let i = 0; i < canvas.width; i += 40) {
        if(Math.sin(i) > 0) {
            ctx.fillRect(i, 0, 15, canvas.height);
        }
    }

    let centerX = canvas.width / 2;
    let centerY = canvas.height / 2;
    let r = 160;

    ctx.save();
    ctx.beginPath();
    ctx.arc(centerX, centerY, r + 4, 0, Math.PI * 2);
    ctx.fillStyle = '#321b0f';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(centerX, centerY, r, -Math.PI/2, Math.PI/2, false);
    ctx.fillStyle = '#442816';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(centerX, centerY, r, Math.PI/2, -Math.PI/2, false);
    ctx.fillStyle = '#734929';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(centerX, centerY + r/2, r/2, 0, Math.PI * 2);
    ctx.fillStyle = '#442816';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(centerX, centerY - r/2, r/2, 0, Math.PI * 2);
    ctx.fillStyle = '#734929';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(centerX, centerY + r/2, 22, 0, Math.PI * 2);
    ctx.fillStyle = '#734929';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(centerX, centerY - r/2, 22, 0, Math.PI * 2);
    ctx.fillStyle = '#442816';
    ctx.fill();

    ctx.restore();
    ctx.strokeStyle = '#321b0f';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(80, 50); ctx.lineTo(720, 50); ctx.lineTo(750, 120); ctx.lineTo(750, 480);
    ctx.lineTo(720, 550); ctx.lineTo(80, 550); ctx.lineTo(50, 480); ctx.lineTo(50, 120);
    ctx.closePath();
    ctx.stroke();
}

function drawRedStartMenuButton() {
    ctx.save();
    const softRed = '#ff6b6b';
    
    ctx.strokeStyle = softRed;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.roundRect(startBtnX, startBtnY, startBtnW, startBtnH, 15);
    ctx.stroke();
    
    ctx.fillStyle = 'rgba(255, 107, 107, 0.15)';
    ctx.fill();
    
    ctx.fillStyle = softRed;
    ctx.font = 'bold 42px "Arial Black", Gadget, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('START', 400, startBtnY + startBtnH / 2 + 2);
    ctx.restore();
}

class GameObject {
    constructor() {
        this.x = Math.random() * (canvas.width - 360) + 180;
        this.y = canvas.height + 70;
        
        const target = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
        this.emoji = target.emoji;
        this.radius = target.size / 2;
        this.isBomb = (this.emoji === '💣');

        this.speedX = (Math.random() - 0.5) * 3.5 * speedMultiplier;
        this.speedY = -(Math.random() * 3 + 13.5) * Math.sqrt(speedMultiplier); 
        this.gravity = 0.20 * speedMultiplier; 
        
        this.sliced = false;
        this.rotation = Math.random() * Math.PI;
        this.rotationSpeed = (Math.random() - 0.5) * 0.04 * speedMultiplier;
    }

    update() {
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.font = `${this.radius * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, 0, 0);
        ctx.restore();
    }
}

class MetalParticle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = Math.random() * 5 + 2.5;
        this.speedX = (Math.random() - 0.5) * 14;
        this.speedY = (Math.random() - 0.5) * 14;
        this.alpha = 1;
        this.color = Math.random() > 0.4 ? '#e8e8e8' : '#ffffff';
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.alpha -= 0.03;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ffffff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

function checkDifficulty() {
    let calculatedLevel = Math.floor(score / 80) + 1; 
    if (calculatedLevel !== currentLevel) {
        currentLevel = calculatedLevel;
        levelEl.innerText = currentLevel;
        
        speedMultiplier = 0.75 + (currentLevel - 1) * 0.10;
        spawnChance = Math.min(0.015 + (currentLevel - 1) * 0.006, 0.06);
        maxObjectsOnScreen = 2 + Math.floor((currentLevel - 1) / 2);
    }
}

function handleSlash(inputX, inputY) {
    if (gameState === "menue") {
        if (inputX > startBtnX && inputX < startBtnX + startBtnW &&
            inputY > startBtnY && inputY < startBtnY + startBtnH) {
            gameState = "playing";
        }
        return;
    }

    if (gameState === "gameover") {
        if (inputX > buttonX - buttonW/2 && inputX < buttonX + buttonW/2 &&
            inputY > buttonY - buttonH/2 && inputY < buttonY + buttonH/2) {
            resetGame();
        }
        return;
    }

    slashTrail.push({x: inputX, y: inputY, alpha: 1});

    objects.forEach((obj) => {
        if (!obj.sliced) {
            let dist = Math.hypot(obj.x - inputX, obj.y - inputY);
            if (dist < obj.radius + 25) { 
                obj.sliced = true;

                if (obj.isBomb) {
                    gameState = "gameover";
                    for (let i = 0; i < 50; i++) {
                        particles.push(new MetalParticle(obj.x, obj.y));
                    }
                } else {
                    score += 10;
                    scoreEl.innerText = score;
                    
                    // NEU: Wenn die aktuellen Punkte den Highscore schlagen, ziehe den Highscore sofort mit!
                    if (score > highscore) {
                        highscore = score;
                        highscoreEl.innerText = highscore;
                        localStorage.setItem("fn_highscore", highscore); // Sicher im Browser merken
                    }

                    checkDifficulty();
                    for (let i = 0; i < 20; i++) {
                        particles.push(new MetalParticle(obj.x, obj.y));
                    }
                }
            }
        }
    });
}

function resetGame() {
    score = 0;
    lives = 3;
    currentLevel = 1;
    speedMultiplier = 0.75;
    spawnChance = 0.015;
    maxObjectsOnScreen = 2;
    gameState = "playing";
    objects = [];
    particles = [];
    slashTrail = [];
    
    scoreEl.innerText = score;
    livesEl.innerText = lives;
    levelEl.innerText = currentLevel;
}

function getCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const coords = getCoordinates(e);
    handleSlash(coords.x, coords.y);
}, { passive: false });

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const coords = getCoordinates(e); handleSlash(coords.x, coords.y); });
canvas.addEventListener('mousemove', (e) => { const coords = getCoordinates(e); handleSlash(coords.x, coords.y); });
canvas.addEventListener('mousedown', (e) => { const coords = getCoordinates(e); handleSlash(coords.x, coords.y); });

function gameLoop() {
    drawWoodBackground();

    // STARTMENÜ-MODUS
    if (gameState === "menue") {
        try {
            if (titleScreenImg.complete && titleScreenImg.naturalWidth !== 0) {
                ctx.drawImage(titleScreenImg, 50, 40, 700, 360);
            } else {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(50, 40, 700, 360);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 60px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('FRUIT NINJA', 400, 220);
            }
        } catch(e) {
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('FRUIT NINJA', 400, 220);
        }

        drawRedStartMenuButton();
    }

    // SPIEL-MODUS
    if (gameState === "playing") {
        if (Math.random() < spawnChance && objects.length < maxObjectsOnScreen) {
            objects.push(new GameObject());
        }

        for (let i = objects.length - 1; i >= 0; i--) {
            let obj = objects[i];
            obj.update();
            if (!obj.sliced) {
                obj.draw();
            }

            if (obj.y > canvas.height + 80 || obj.x < -80 || obj.x > canvas.width + 80) {
                if (!obj.sliced && !obj.isBomb) {
                    if (obj.y > canvas.height + 80 && obj.x >= 0 && obj.x <= canvas.width) {
                        lives--;
                        livesEl.innerText = lives;
                        if (lives <= 0) gameState = "gameover";
                    }
                }
                objects.splice(i, 1);
            }
        }
    }

    // EFFEKTE
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    for (let i = 1; i < slashTrail.length; i++) {
        ctx.save();
        ctx.beginPath();
        let gradient = ctx.createLinearGradient(slashTrail[i-1].x, slashTrail[i-1].y, slashTrail[i].x, slashTrail[i].y);
        gradient.addColorStop(0, `rgba(220, 220, 220, ${slashTrail[i].alpha})`);
        gradient.addColorStop(0.5, `rgba(255, 255, 255, ${slashTrail[i].alpha})`);
        gradient.addColorStop(1, `rgba(160, 160, 160, ${slashTrail[i].alpha})`);
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 10; 
        ctx.lineCap = 'round';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ffffff';
        ctx.moveTo(slashTrail[i-1].x, slashTrail[i-1].y);
        ctx.lineTo(slashTrail[i].x, slashTrail[i].y);
        ctx.stroke();
        ctx.restore();
        slashTrail[i].alpha -= 0.06;
    }
    slashTrail = slashTrail.filter(p => p.alpha > 0);

    // GAME OVER-MODUS
    if (gameState === "gameover") {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 65px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        let btnGradient = ctx.createLinearGradient(buttonX, buttonY - buttonH/2, buttonX, buttonY + buttonH/2);
        btnGradient.addColorStop(0, '#ff9800');
        btnGradient.addColorStop(1, '#e65100');
        ctx.fillStyle = btnGradient;
        ctx.beginPath();
        ctx.roundRect(buttonX - buttonW/2, buttonY - buttonH/2, buttonW, buttonH, 30);
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px Arial';
        ctx.textBaseline = 'middle';
        ctx.fillText('Play again 🔄', buttonX, buttonY);
        ctx.restore();
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
