<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Ninja - Premium Edition</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        #gameWrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            padding: 10px;
            box-sizing: border-box;
        }
        canvas {
            border: 4px solid #2d1a0e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 12px;
            max-width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            cursor: pointer;
            touch-action: none;
        }
        #scoreBoard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.75);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid #444;
            box-sizing: border-box;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #levelBadge {
            color: #ffeb3b;
        }
        #score {
            color: #4caf50;
        }
        #lives {
            color: #f44336;
        }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div id="scoreBoard">
            <div class="stat-item">⚔️ Punkte: <span id="score">0</span></div>
            <div class="stat-item">❤️ Leben: <span id="lives">3</span></div>
            <div class="stat-item">⚡ Level: <span id="levelBadge">1</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('levelBadge');

let score = 0;
let lives = 3;
let gameOver = false;
let objects = [];
let particles = [];
let slashTrail = [];

let currentLevel = 1;
let speedMultiplier = 1.0; 
let spawnChance = 0.035; 

// Koordinaten für den virtuellen "Erneut spielen"-Button auf dem Canvas
const buttonX = 400;
const buttonY = 380;
const buttonW = 240;
const buttonH = 60;

const fruitTypes = [
    { emoji: '🍉', size: 90 },
    { emoji: '🍌', size: 85 },
    { emoji: '🍓', size: 75 },
    { emoji: '🍋', size: 75 },
    { emoji: '🍎', size: 80 },
    { emoji: '💣', size: 80 }
];

// Zeichnet den originalen Yin-Yang Holzhintergrund direkt per Code
function drawWoodBackground() {
    // 1. Warme Holzfarbe als Basis
    ctx.fillStyle = '#5c3a21';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Feine Holzmaserung zeichnen
    ctx.fillStyle = '#4a2e1a';
    for(let i = 0; i < canvas.width; i += 40) {
        if(Math.sin(i) > 0) {
            ctx.fillRect(i, 0, 15, canvas.height);
        }
    }

    // 2. Großes Yin-Yang-Symbol in der Mitte
    let centerX = canvas.width / 2;
    let centerY = canvas.height / 2;
    let r = 160;

    ctx.save();
    // Dunkle Rille für plastischen Effekt
    ctx.beginPath();
    ctx.arc(centerX, centerY, r + 4, 0, Math.PI * 2);
    ctx.fillStyle = '#321b0f';
    ctx.fill();

    // Rechter Halbkreis (Dunkles Holz)
    ctx.beginPath();
    ctx.arc(centerX, centerY, r, -Math.PI/2, Math.PI/2, false);
    ctx.fillStyle = '#442816';
    ctx.fill();

    // Linker Halbkreis (Helles Holz)
    ctx.beginPath();
    ctx.arc(centerX, centerY, r, Math.PI/2, -Math.PI/2, false);
    ctx.fillStyle = '#734929';
    ctx.fill();

    // Unterer Bogen (Dunkel)
    ctx.beginPath();
    ctx.arc(centerX, centerY + r/2, r/2, 0, Math.PI * 2);
    ctx.fillStyle = '#442816';
    ctx.fill();

    // Oberer Bogen (Hell)
    ctx.beginPath();
    ctx.arc(centerX, centerY - r/2, r/2, 0, Math.PI * 2);
    ctx.fillStyle = '#734929';
    ctx.fill();

    // Heller Punkt im dunklen Bogen
    ctx.beginPath();
    ctx.arc(centerX, centerY + r/2, 22, 0, Math.PI * 2);
    ctx.fillStyle = '#734929';
    ctx.fill();

    // Dunkler Punkt im hellen Bogen
    ctx.beginPath();
    ctx.arc(centerX, centerY - r/2, 22, 0, Math.PI * 2);
    ctx.fillStyle = '#442816';
    ctx.fill();

    // Äußerer oktogonaler Rahmen (Klassischer Look!)
    ctx.restore();
    ctx.strokeStyle = '#321b0f';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(80, 50); 
    ctx.lineTo(720, 50); 
    ctx.lineTo(750, 120); 
    ctx.lineTo(750, 480);
    ctx.lineTo(720, 550); 
    ctx.lineTo(80, 550); 
    ctx.lineTo(50, 480); 
    ctx.lineTo(50, 120);
    ctx.closePath();
    ctx.stroke();
}

class GameObject {
    constructor() {
        this.x = Math.random() * (canvas.width - 240) + 120;
        this.y = canvas.height + 70;
        
        const target = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
        this.emoji = target.emoji;
        this.radius = target.size / 2;
        this.isBomb = (this.emoji === '💣');

        // Seitengeschwindigkeit und Flughöhe an Level anpassen
        this.speedX = (Math.random() - 0.5) * 5 * (1 + (speedMultiplier - 1) * 0.25);
        this.speedY = -(Math.random() * 3 + 15) * Math.sqrt(speedMultiplier); 
        this.gravity = 0.22 * speedMultiplier; 
        
        this.sliced = false;
        this.rotation = Math.random() * Math.PI;
        this.rotationSpeed = (Math.random() - 0.5) * 0.06 * speedMultiplier;
    }

    update() {
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.font = `${this.radius * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, 0, 0);
        ctx.restore();
    }
}

// Edle, metallisch glänzende Partikel (Chrom-Effekt)
class MetalParticle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = Math.random() * 6 + 3;
        this.speedX = (Math.random() - 0.5) * 16;
        this.speedY = (Math.random() - 0.5) * 16;
        this.alpha = 1;
        // Funkelnder Silber/Weiß Verlauf-Look
        this.color = Math.random() > 0.4 ? '#e8e8e8' : '#ffffff';
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.alpha -= 0.028;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffffff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

function checkDifficulty() {
    // Level erhöht sich alle 100 Punkte
    let calculatedLevel = Math.floor(score / 100) + 1;
    if (calculatedLevel !== currentLevel) {
        currentLevel = calculatedLevel;
        levelEl.innerText = currentLevel;
        speedMultiplier = 1.0 + (currentLevel - 1) * 0.12;
        spawnChance = Math.min(0.035 + (currentLevel - 1) * 0.005, 0.07);
    }
}

function handleSlash(inputX, inputY) {
    if (gameOver) {
        // Klick auf den gezeichneten Reset-Button überprüfen
        if (inputX > buttonX - buttonW/2 && inputX < buttonX + buttonW/2 &&
            inputY > buttonY - buttonH/2 && inputY < buttonY + buttonH/2) {
            resetGame();
        }
        return;
    }

    slashTrail.push({x: inputX, y: inputY, alpha: 1});

    objects.forEach((obj) => {
        if (!obj.sliced) {
            let dist = Math.hypot(obj.x - inputX, obj.y - inputY);
            if (dist < obj.radius + 25) { 
                obj.sliced = true;

                if (obj.isBomb) {
                    gameOver = true;
                    // Riesen-Funkenexplosion bei Bombe
                    for (let i = 0; i < 60; i++) {
                        particles.push(new MetalParticle(obj.x, obj.y));
                    }
                } else {
                    score += 10;
                    scoreEl.innerText = score;
                    checkDifficulty();
                    // Metallisches Funkeln beim Fruchtschnitt
                    for (let i = 0; i < 25; i++) {
                        particles.push(new MetalParticle(obj.x, obj.y));
                    }
                }
            }
        }
    });
}

function resetGame() {
    score = 0;
    lives = 3;
    currentLevel = 1;
    speedMultiplier = 1.0;
    spawnChance = 0.035;
    gameOver = false;
    objects = [];
    particles = [];
    slashTrail = [];
    
    scoreEl.innerText = score;
    livesEl.innerText = lives;
    levelEl.innerText = currentLevel;
    
    gameLoop();
}

// Holen der präzisen Touch- und Maus-Koordinaten für jedes Display
function getCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX, clientY;
    if (e.touches && e.touches[0]) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

// EVENT-STEUERUNG (iPad & PC)
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const coords = getCoordinates(e);
    handleSlash(coords.x, coords.y);
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
    const coords = getCoordinates(e);
    handleSlash(coords.x, coords.y);
});

canvas.addEventListener('mousemove', (e) => {
    const coords = getCoordinates(e);
    handleSlash(coords.x, coords.y);
});

canvas.addEventListener('mousedown', (e) => {
    const coords = getCoordinates(e);
    handleSlash(coords.x, coords.y);
});

function gameLoop() {
    // 1. Hintergrund zeichnen
    drawWoodBackground();

    // Neue Früchte/Bomben spawnen
    if (!gameOver && Math.random() < spawnChance) {
        objects.push(new GameObject());
    }

    // Objekte fliegen und drehen lassen
    for (let i = objects.length - 1; i >= 0; i--) {
        let obj = objects[i];
        obj.update();
        if (!obj.sliced) {
            obj.draw();
        }

        // Wenn das Objekt nach unten durchfällt
        if (obj.y > canvas.height + 80) {
            // Nur verpasste Früchte kosten Leben, Bomben nicht!
            if (!obj.sliced && !obj.isBomb) {
                lives--;
                livesEl.innerText = lives;
                if (lives <= 0) gameOver = true;
            }
            objects.splice(i, 1);
        }
    }

    // Metallische Partikel updaten und anzeigen
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    // Die glänzende Chrome-Klingenspur zeichnen
    for (let i = 1; i < slashTrail.length; i++) {
        ctx.save();
        ctx.beginPath();
        let gradient = ctx.createLinearGradient(slashTrail[i-1].x, slashTrail[i-1].y, slashTrail[i].x, slashTrail[i].y);
        gradient.addColorStop(0, `rgba(220, 220, 220, ${slashTrail[i].alpha})`);
        gradient.addColorStop(0.5, `rgba(255, 255, 255, ${slashTrail[i].alpha})`);
        gradient.addColorStop(1, `rgba(160, 160, 160, ${slashTrail[i].alpha})`);
        
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 10; // Extra breiter, cooler Schnitt
        ctx.lineCap = 'round';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ffffff';
        
        ctx.moveTo(slashTrail[i-1].x, slashTrail[i-1].y);
        ctx.lineTo(slashTrail[i].x, slashTrail[i].y);
        ctx.stroke();
        ctx.restore();
        
        slashTrail[i].alpha -= 0.06;
    }
    slashTrail = slashTrail.filter(p => p.alpha > 0);

    // GAME OVER Bildschirm
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 65px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

        // Edlen Reset-Button direkt auf das Canvas zeichnen
        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        
        let btnGradient = ctx.createLinearGradient(buttonX, buttonY - buttonH/2, buttonX, buttonY + buttonH/2);
        btnGradient.addColorStop(0, '#ff9800');
        btnGradient.addColorStop(1, '#e65100');
        ctx.fillStyle = btnGradient;
        
        ctx.beginPath();
        ctx.roundRect(buttonX - buttonW/2, buttonY - buttonH/2, buttonW, buttonH, 30);
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px Arial';
        ctx.textBaseline = 'middle';
        ctx.fillText('Erneut spielen 🔄', buttonX, buttonY);
        ctx.restore();
    } else {
        requestAnimationFrame(gameLoop);
    }
}

// Start des Spiels
gameLoop();
</script>
</body>
