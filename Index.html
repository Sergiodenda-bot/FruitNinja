<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Ninja - Perfekte Edition</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        #gameWrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 4px solid #2d1a0e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            max-width: 100%;
            max-height: 85vh;
            cursor: pointer;
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.7);
            padding: 10px 25px;
            border-radius: 25px;
            border: 1px solid #444;
        }
        #levelBadge {
            color: #ffeb3b;
            margin-left: 15px;
        }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div id="scoreBoard">
            ⚔️ Punkte: <span id="score">0</span> | 
            ❤️ Leben: <span id="lives">3</span> | 
            ⚡ Level: <span id="levelBadge">1</span>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('levelBadge');

let score = 0;
let lives = 3;
let gameOver = false;
let objects = [];
let particles = [];
let slashTrail = [];

let currentLevel = 1;
let speedMultiplier = 1.0; 
let spawnChance = 0.035; 

const buttonX = 400;
const buttonY = 380;
const buttonW = 220;
const buttonH = 55;

const fruitTypes = [
    { emoji: '🍉', size: 90 },
    { emoji: '🍌', size: 85 },
    { emoji: '🍓', size: 75 },
    { emoji: '🍋', size: 75 },
    { emoji: '🍎', size: 80 },
    { emoji: '💣', size: 80 }
];

// FUNKTION DIE DEIN YIN-YANG WUNSCHBILD AUTOMATISCH ZEICHNET
function drawWoodBackground() {
    // 1. Basis-Holzfarbe flächig zeichnen
    ctx.fillStyle = '#5c3a21';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Holzmaserung-Streifen simulieren
    ctx.fillStyle = '#4a2e1a';
    for(let i = 0; i < canvas.width; i += 40) {
        if(Math.sin(i) > 0) {
            ctx.fillRect(i, 0, 15, canvas.height);
        }
    }

    // 2. Großer runder Rahmen für das Yin-Yang Symbol in der Mitte
    let centerX = canvas.width / 2;
    let centerY = canvas.height / 2;
    let r = 160;

    ctx.save();
    // Dunklerer Kreis für die Vertiefung des Symbols
    ctx.beginPath();
    ctx.arc(centerX, centerY, r + 4, 0, Math.PI * 2);
    ctx.fillStyle = '#3d2514';
    ctx.fill();

    // Rechter Halbkreis (Dunkles Holz)
    ctx.beginPath();
    ctx.arc(centerX, centerY, r, -Math.PI/2, Math.PI/2, false);
    ctx.fillStyle = '#442816';
    ctx.fill();

    // Linker Halbkreis (Helles Holz)
    ctx.beginPath();
    ctx.arc(centerX, centerY, r, Math.PI/2, -Math.PI/2, false);
    ctx.fillStyle = '#734929';
    ctx.fill();

    // Unterer kleiner Bogen (Dunkel)
    ctx.beginPath();
    ctx.arc(centerX, centerY + r/2, r/2, 0, Math.PI * 2);
    ctx.fillStyle = '#442816';
    ctx.fill();

    // Oberer kleiner Bogen (Hell)
    ctx.beginPath();
    ctx.arc(centerX, centerY - r/2, r/2, 0, Math.PI * 2);
    ctx.fillStyle = '#734929';
    ctx.fill();

    // Kleiner heller Punkt unten
    ctx.beginPath();
    ctx.arc(centerX, centerY + r/2, 25, 0, Math.PI * 2);
    ctx.fillStyle = '#734929';
    ctx.fill();

    // Kleiner dunkler Punkt oben
    ctx.beginPath();
    ctx.arc(centerX, centerY - r/2, 25, 0, Math.PI * 2);
    ctx.fillStyle = '#442816';
    ctx.fill();

    // Äußerer dekorativer Achteck-Holzrahmen (wie auf deinem Foto!)
    ctx.restore();
    ctx.strokeStyle = '#3d2514';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(80, 50); ctx.lineTo(720, 50); ctx.lineTo(750, 120); ctx.lineTo(750, 480);
    ctx.lineTo(720, 550); ctx.lineTo(80, 550); ctx.lineTo(50, 480); ctx.lineTo(50, 120);
    ctx.closePath();
    ctx.stroke();
}

class GameObject {
    constructor() {
        this.x = Math.random() * (canvas.width - 200) + 100;
        this.y = canvas.height + 70;
        
        const target = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
        this.emoji = target.emoji;
        this.radius = target.size / 2;
        this.isBomb = (this.emoji === '💣');

        this.speedX = (Math.random() - 0.5) * 5 * (1 + (speedMultiplier - 1) * 0.3);
        this.speedY = -(Math.random() * 3 + 15) * speedMultiplier; 
        this.gravity = 0.22 * speedMultiplier; 
        
        this.sliced = false;
        this.rotation = Math.random() * Math.PI;
        this.rotationSpeed = (Math.random() - 0.5) * 0.06 * speedMultiplier;
    }

    update() {
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.font = `${this.radius * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, 0, 0);
        ctx.restore();
    }
}

class MetalParticle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = Math.random() * 5 + 3;
        this.speedX = (Math.random() - 0.5) * 14;
        this.speedY = (Math.random() - 0.5) * 14;
        this.alpha = 1;
        this.color = Math.random() > 0.4 ? '#e8e8e8' : '#ffffff';
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.alpha -= 0.025;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

function checkDifficulty() {
    let calculatedLevel = Math.floor(score / 100) + 1;
    if (calculatedLevel !== currentLevel) {
        currentLevel = calculatedLevel;
        levelEl.innerText = currentLevel;
        speedMultiplier = 1.0 + (currentLevel - 1) * 0.12;
        spawnChance = Math.min(0.035 + (currentLevel - 1) * 0.005, 0.07);
    }
}

function handleSlash(inputX, inputY) {
    if (gameOver) {
        if (inputX > buttonX - buttonW/2 && inputX < buttonX + buttonW/2 &&
            inputY > buttonY - buttonH/2 && inputY < buttonY + buttonH/2) {
            resetGame();
        }
        return;
    }

    slashTrail.push({x: inputX, y: inputY, alpha: 1});

    objects.forEach((obj) => {
        if (!obj.sliced) {
            let dist = Math.hypot(obj.x - inputX, obj.y - inputY);
            if (dist < obj.radius + 20) { 
                obj.sliced = true;

                if (obj.isBomb) {
                    gameOver = true;
                } else {
                    score += 10;
                    scoreEl.innerText = score;
                    checkDifficulty();
                    for (let i = 0; i < 25; i++) {
                        particles.push(new MetalParticle(obj.x, obj.y));
                    }
                }
            }
        }
    });
}

function resetGame() {
    score = 0;
    lives = 3;
    currentLevel = 1;
    speedMultiplier = 1.0;
    spawnChance = 0.035;
    gameOver = false;
    objects = [];
    particles = [];
    slashTrail = [];
    
    scoreEl.innerText = score;
    livesEl.innerText = lives;
    levelEl.innerText = currentLevel;
    
    gameLoop();
}

// IPAD-TOUCH-STEUERUNG
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    handleSlash((touch.clientX - rect.left) * scaleX, (touch.clientY - rect.top) * scaleY);
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    handleSlash((touch.clientX - rect.left) * scaleX, (touch.clientY - rect.top) * scaleY);
});

// MAUS-STEUERUNG
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    handleSlash((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    handleSlash((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});

function gameLoop() {
    // Hintergrund zeichnen
    drawWoodBackground();

    if (!gameOver && Math.random() < spawnChance) {
        objects.push(new GameObject());
    }

    for (let i = objects.length - 1; i >= 0; i--) {
        let obj = objects[i];
        obj.update();
        if (!obj.sliced) {
            obj.draw();
        }

        if (obj.y > canvas.height + 80) {
            if (!obj.sliced && !obj.isBomb) {
                lives--;
                livesEl.innerText = lives;
                if (lives <= 0) gameOver = true;
            }
            objects.splice(i, 1);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    // Klingen-Spur (Metall-Effekt)
    for (let i = 1; i < slashTrail.length; i++) {
        ctx.save();
        ctx.beginPath();
        let gradient = ctx.createLinearGradient(slashTrail[i-1].x, slashTrail[i-1].y, slashTrail[i].x, slashTrail[i].y);
        gradient.addColorStop(0, `rgba(220, 220, 220, ${slashTrail[i].alpha})`);
        gradient.addColorStop(0.5, `rgba(255, 255, 255, ${slashTrail[i].alpha})`);
        gradient.addColorStop(1, `rgba(160, 160, 160, ${slashTrail[i].alpha})`);
        
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 8; 
        ctx.lineCap = 'round';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#fff';
        
        ctx.moveTo(slashTrail[i-1].x, slashTrail[i-1].y);
        ctx.lineTo(slashTrail[i].x, slashTrail[i].y);
        ctx.stroke();
        ctx.restore();
        
        slashTrail[i].alpha -= 0.06;
    }
    slashTrail = slashTrail.filter(p => p.alpha > 0);

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

        // RESET-KNOPF
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        
        let btnGradient = ctx.createLinearGradient(buttonX, buttonY - buttonH/2, buttonX, buttonY + buttonH/2);
        btnGradient.addColorStop(0, '#ff9800');
        btnGradient.addColorStop(1, '#e65100');
        ctx.fillStyle = btnGradient;
        
        ctx.beginPath();
        ctx.roundRect(buttonX - buttonW/2, buttonY - buttonH/2, buttonW, buttonH, 25);
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 20px Arial';
        ctx.textBaseline = 'middle';
        ctx.fillText('Erneut spielen 🔄', buttonX, buttonY);
        ctx.restore();
    } else {
        requestAnimationFrame(gameLoop);
    }
}

gameLoop();
</script>
</body>
</html>
